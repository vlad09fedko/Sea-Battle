<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sea Battle</title>
    <link
      rel="shortcut icon"
      href="./assets/icons/icons8-sea-of-thieves-96.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./assets/styles/reset.css" />
    <link rel="stylesheet" href="./assets/styles/style.css" />
  </head>
  <body>
    <div class="sea-battle-container">
      <div class="corner"></div>
      <div class="letters">
        <div class="letter">A</div>
        <div class="letter">B</div>
        <div class="letter">C</div>
        <div class="letter">D</div>
        <div class="letter">E</div>
        <div class="letter">F</div>
        <div class="letter">G</div>
        <div class="letter">H</div>
        <div class="letter">I</div>
        <div class="letter">J</div>
      </div>
      <div class="numbers">
        <div class="num">1</div>
        <div class="num">2</div>
        <div class="num">3</div>
        <div class="num">4</div>
        <div class="num">5</div>
        <div class="num">6</div>
        <div class="num">7</div>
        <div class="num">8</div>
        <div class="num">9</div>
        <div class="num">10</div>
      </div>
      <div class="ships">
        <div class="ship purple"></div>
        <div class="ship green"></div>
        <div class="ship blue"></div>
        <div class="ship blue"></div>
        <div class="ship green"></div>
        <div class="ship purple"></div>
        <div class="ship purple"></div>
        <div class="ship green"></div>
        <div class="ship purple"></div>
        <div class="ship red"></div>
      </div>
    </div>
  </body>
</html>
